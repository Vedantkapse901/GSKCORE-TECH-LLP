<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange gradient background -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect x="80" y="80" width="640" height="640" rx="100" fill="url(#orangeGradient)"/>

  <!-- GSK Text -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="200" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="10">GSK</text>

  <!-- Core Tech LLP Text -->
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="70" font-weight="500" text-anchor="middle" fill="white" letter-spacing="2">Core Tech</text>
  <text x="400" y="560" font-family="Arial, sans-serif" font-size="55" font-weight="400" text-anchor="middle" fill="white" letter-spacing="2">LLP</text>
</svg>
